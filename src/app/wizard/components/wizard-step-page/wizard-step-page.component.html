<ng-container *ngIf="vm$ | async as vm">
  <div class="step-page">
    <!-- <div class="step-caption">
      שלב {{ vm.step }} · טופס {{ vm.formIndex }} / {{ vm.totalForms }}
    </div> -->
    <div class="step-title" *ngIf="currentFormTitle">
      {{ currentFormTitle }}
    </div>
    <div class="form-card">
      <div class="form-card-inner" [@slideForm]="getAnimationState(vm.step, vm.formIndex)">

        <ng-container [ngSwitch]="getFormKey(vm.step, vm.formIndex)">
          <app-step1-form1 *ngSwitchCase="'1-1'" [form]="$any(vm.form)"></app-step1-form1>

          <app-step2-form1 *ngSwitchCase="'2-1'" [form]="$any(vm.form)"></app-step2-form1>
          <app-step2-form2 *ngSwitchCase="'2-2'" [form]="$any(vm.form)"></app-step2-form2>

          <app-step3-form1 *ngSwitchCase="'3-1'" [form]="$any(vm.form)"></app-step3-form1>
          <app-step3-form2 *ngSwitchCase="'3-2'" [form]="$any(vm.form)"></app-step3-form2>
          <app-step3-form3 *ngSwitchCase="'3-3'" [form]="$any(vm.form)"></app-step3-form3>
          <app-step3-form4 *ngSwitchCase="'3-4'" [form]="$any(vm.form)"></app-step3-form4>

          <app-step4-form1 *ngSwitchCase="'4-1'" [form]="$any(vm.form)"></app-step4-form1>
          <app-step4-form2 *ngSwitchCase="'4-2'" [form]="$any(vm.form)"></app-step4-form2>

          <app-step5-form1 *ngSwitchCase="'5-1'" [form]="$any(vm.form)"></app-step5-form1>
          <app-step5-form2 *ngSwitchCase="'5-2'" [form]="$any(vm.form)"></app-step5-form2>
          <app-step5-form3 *ngSwitchCase="'5-3'"></app-step5-form3>

          <div *ngSwitchDefault>
            לא נמצא טופס עבור {{ getFormKey(vm.step, vm.formIndex) }}
          </div>
        </ng-container>
      </div>
    </div>

    <ng-container *ngIf="shouldShowActionBar(vm.step, vm.formIndex)">
      <div class="actions rtl-actions">
        <p-button *ngIf="shouldShowPrevButton(vm.step, vm.formIndex)" label="לשלב הקודם" severity="secondary"
          [outlined]="true" [disabled]="isPrevDisabled(vm.step, vm.formIndex)" class="prev"
          (onClick)="prev(vm.step, vm.formIndex)">
        </p-button>

        <p-button *ngIf="shouldShowNextButton(vm.step, vm.formIndex)"
          [label]="vm.step === 5 && vm.formIndex === vm.totalForms ? 'סיום' : 'לשלב הבא'" class="next"
          (onClick)="next(vm.step, vm.formIndex)">
        </p-button>
      </div>
    </ng-container>


    <div class="partial-actions-bar" *ngIf="!shouldShowActionBar(vm.step, vm.formIndex)">
      <div class="partial-actions">
        <button type="button" class="secondary-action" (click)="openLoanDecisionModal('sentToAgent')">
          בקשה לשיחה עם נציג
        </button>
        <button type="button" class="primary-action" (click)="openLoanDecisionModal('manualProcess')">
          אישור התנאים החדשים
        </button>
      </div>
      <p>
        במידה ותרצו לשנות את תנאי ההלוואה, יש לפנות לשיחה עם נציג
      </p>
    </div>
  </div>
</ng-container>

<app-loan-blocked-popup *ngIf="flow.showLoanBlockedPopup$ | async"
  (close)="flow.showLoanBlockedPopup$.next(false)"></app-loan-blocked-popup>

<app-loan-decision-modal *ngIf="loanDecisionModalType" 
  [type]="loanDecisionModalType"
  (confirmed)="onLoanDecisionModalConfirmed($event)" />
